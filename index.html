<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>I Love You Piku</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial,sans-serif;
}

#loading{
position:fixed;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
background:#111;
color:white;
font-size:28px;
z-index:999;
}

.love{
position:absolute;
color:#ff66cc;
font-size:35px;
text-shadow:0 0 15px #ff66cc;
animation:float 10s linear infinite;
white-space:nowrap;
}

@keyframes float{
0%{
transform:translateY(100vh);
opacity:0;
}
100%{
transform:translateY(-120vh);
opacity:1;
}
}
</style>
</head>

<body>

<div id="loading">যাচাই করা হচ্ছে...</div>

<script>
setTimeout(()=>{
document.getElementById("loading").style.display="none";

for(let i=0;i<35;i++){
let d=document.createElement("div");
d.className="love";
d.innerHTML="❤️ I Love You Piku ❤️";
d.style.left=Math.random()*100+"vw";
d.style.top=Math.random()*100+"vh";
d.style.animationDuration=(6+Math.random()*6)+"s";
document.body.appendChild(d);
}
},3000);
</script>

</body>
</html>
