<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I Love You ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#000;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:sans-serif;
}

#loading{
color:white;
font-size:28px;
animation:blink 1s infinite;
}

@keyframes blink{
50%{opacity:.3;}
}

.love{
position:absolute;
font-size:30px;
color:red;
animation:fall linear infinite;
}

@keyframes fall{
0%{
transform:translateY(-100vh) scale(.5);
opacity:0;
}
100%{
transform:translateY(100vh) scale(1.5);
opacity:1;
}
}
</style>
</head>

<body>

<div id="loading">স্ক্যান করা হচ্ছে...</div>

<script>
setTimeout(()=>{

document.getElementById("loading").style.display="none";

for(let i=0;i<40;i++){
let d=document.createElement("div");
d.className="love";
d.innerHTML="❤️ I Love You Piku ❤️";
d.style.left=Math.random()*100+"vw";
d.style.top=Math.random()*100+"vh";
d.style.animationDuration=(5+Math.random()*5)+"s";
document.body.appendChild(d);
}

},3000);
</script>

</body>
</html>
