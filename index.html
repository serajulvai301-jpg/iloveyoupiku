<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Love For You</title>

<style>
body{
margin:0;
overflow:hidden;
background: radial-gradient(circle at center, #120012, #000);
font-family: Arial, sans-serif;
}

/* center */
.center{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
color:white;
z-index:10;
}

button{
padding:14px 28px;
border:none;
border-radius:30px;
background:#ff4da6;
color:white;
font-size:16px;
cursor:pointer;
box-shadow:0 0 18px #ff4da6;
}

/* 💖 clean floating text (no fancy Unicode font) */
.love{
position:absolute;
color:#ffb3d9;
font-size:26px;
font-weight:bold;
text-shadow:0 0 12px #ff4da6;
animation:floatUp 9s linear infinite;
pointer-events:none;
white-space:nowrap;
opacity:0.9;
}

/* smooth float */
@keyframes floatUp{
0%{transform:translateY(110vh); opacity:0;}
20%{opacity:1;}
100%{transform:translateY(-120vh); opacity:0;}
}

/* 💗 hearts */
.heart{
position:absolute;
font-size:20px;
animation:heartFloat 7s linear infinite;
pointer-events:none;
}

@keyframes heartFloat{
0%{transform:translateY(100vh); opacity:0;}
50%{opacity:1;}
100%{transform:translateY(-120vh); opacity:0;}
}

/* bottom message (iPhone style emoji use) */
#msg{
position:fixed;
bottom:20px;
width:100%;
text-align:center;
color:#ffb3d9;
font-size:18px;
text-shadow:0 0 10px #ff4da6;
}
</style>
</head>

<body>

<div class="center" id="home">
<p>💖 Click Start</p>
<button onclick="startLove()">Start</button>
</div>

<div id="msg">[ pakhi eta tmr jonno ] 🫣💖😭</div>

<script>

let text = "I Love You Moriom 💖😭";

function startLove(){

document.getElementById("home").style.display="none";

/* floating text */
for(let i=0;i<25;i++){
let d=document.createElement("div");
d.className="love";
d.innerHTML=text;

d.style.left=Math.random()*100+"vw";
d.style.animationDuration=(6+Math.random()*5)+"s";

document.body.appendChild(d);
}

/* hearts */
for(let i=0;i<20;i++){
let h=document.createElement("div");
h.className="heart";
h.innerHTML="💖";

h.style.left=Math.random()*100+"vw";
h.style.animationDuration=(5+Math.random()*5)+"s";

document.body.appendChild(h);
}

}

</script>

</body>
</html>
